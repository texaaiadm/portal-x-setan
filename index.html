<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="/popup.df89bfed.css">
    <title>Setan Tools</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* BASE THEME - Pure Black */
        body {
            background-color: #000000 !important;
            min-height: 100vh;
            overflow-y: auto !important;
            padding: 0 !important;
            margin: 0 !important;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* ====== LOGIN OVERLAY STYLES ====== */
        #loginOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            padding: 20px;
            box-sizing: border-box;
        }

        .login-container {
            background: rgba(20, 20, 30, 0.95);
            border: 1px solid #00ff88;
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
            text-align: center;
        }

        .login-logo {
            width: 280px;
            height: 120px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            animation: logo-glow 2s ease-in-out infinite;
            object-fit: cover;
        }

        @keyframes logo-glow {

            0%,
            100% {
                box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
            }

            50% {
                box-shadow: 0 0 30px rgba(0, 255, 136, 0.8);
            }
        }

        .login-title {
            color: #00ff88;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .login-subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .login-form {
            width: 100%;
        }

        .input-wrapper {
            margin-bottom: 20px;
            text-align: left;
        }

        #emailInput {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        #emailInput:focus {
            border-color: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        #loginBtn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #loginBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }

        #loginBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        #loginError {
            background: rgba(255, 50, 50, 0.2);
            border: 1px solid #ff5050;
            color: #ff6b6b;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
            display: none;
            text-align: left;
        }

        #loginLoading {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 15px;
            color: #00ff88;
        }

        .loading-spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(0, 255, 136, 0.3);
            border-top: 3px solid #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .login-footer {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }

        .login-footer p {
            color: #666;
            font-size: 12px;
            margin: 0;
        }

        .login-footer a {
            color: #00ff88;
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        /* ====== MAIN APP STYLES (after login) ====== */
        #main-app {
            display: none;
            padding: 40px 0;
        }

        /* === ISOLATION LOGIC: SHOW ONLY ICONS === */
        #main-app header,
        #main-app footer,
        #main-app nav,
        #main-app h1,
        #main-app h2,
        #main-app h3,
        #main-app input {
            display: none !important;
        }

        #main-app button:not(:where([class*="grid-cols-"] *)):not(#logoutBtn) {
            display: none !important;
        }

        #main-app a:not(:where([class*="grid-cols-"] *)),
        #main-app img:not(:where([class*="grid-cols-"] *)):not(.brand-logo) {
            display: none !important;
        }

        #main-app #__plasmo>div>*:not(:has([class*="grid-cols-"])) {
            display: none !important;
        }

        /* === LAYOUT FIX: TIGHT & CENTERED GRID === */
        @media (min-width: 768px) {

            .grid-cols-6,
            .md\:grid-cols-6,
            div[class*="grid-cols-"] {
                display: grid !important;
                max-width: 1000px !important;
                margin: 0 auto !important;
                gap: 24px !important;
                justify-content: center !important;
                grid-template-columns: repeat(6, 1fr) !important;
            }

            [class*="grid-cols-"]>* {
                width: 100% !important;
                max-width: 150px !important;
                margin: 0 auto !important;
            }
        }

        /* Hide bottom warning banner */
        div.absolute.bottom-0,
        div[class*="absolute"][class*="bottom-0"],
        div[class*="w-"][class*="absolute"][class*="bottom"] {
            display: none !important;
        }

        /* Hide version text */
        p.text-xs,
        .text-xs {
            display: none !important;
        }

        /* Brand logo container */
        .brand-logo-container {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-logo {
            width: 65px;
            height: 65px;
            border-radius: 8px;
            object-fit: cover;
            animation: glow-pulse 2s ease-in-out infinite;
            border: 2px solid #00ff88;
            box-shadow: 0 0 8px #00ff88, 0 0 15px #00ff88, 0 0 25px #00ff88;
        }

        @keyframes glow-pulse {

            0%,
            100% {
                box-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88, 0 0 30px #00ff88;
                filter: brightness(1);
            }

            50% {
                box-shadow: 0 0 15px #00ffaa, 0 0 30px #00ffaa, 0 0 45px #00ffaa, 0 0 60px #00ffaa;
                filter: brightness(1.2);
            }
        }

        /* User info badge */
        #userBadge {
            position: fixed;
            top: 15px;
            right: 100px;
            z-index: 9999;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 11px;
            display: none;
        }
    </style>
</head>

<body>
    <!-- ====== LOGIN OVERLAY ====== -->
    <div id="loginOverlay">
        <div class="login-container">
            <img class="login-logo"
                src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExcDVqODllNmwzN283OW10NTAyMWJkdmpncWpxemYycnVlNGNvM3l2dyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/p2osL7gT4jE7bLHqRu/giphy.gif"
                alt="Logo">
            <h1 class="login-title">Setan Tools</h1>
            <p class="login-subtitle">Masuk dengan email member terdaftar</p>

            <form id="loginForm" class="login-form">
                <div class="input-wrapper">
                    <input type="email" id="emailInput" placeholder="contoh@email.com" autocomplete="email" required>
                </div>
                <button type="submit" id="loginBtn">Masuk</button>
            </form>

            <div id="loginError"></div>

            <div id="loginLoading">
                <div class="loading-spinner"></div>
                <p style="margin-top: 10px; font-size: 12px;">Memverifikasi member...</p>
            </div>

            <div class="login-footer">
                <p>Butuh bantuan? <a href="https://chat.whatsapp.com/GV9iIEPdopi2gnJwsyZoR7" target="_blank">💬 Hubungi
                        Support</a></p>
            </div>
        </div>
    </div>

    <!-- ====== MAIN APP (Hidden until login) ====== -->
    <div id="main-app">
        <!-- User Badge -->
        <div id="userBadge"></div>

        <div id="__plasmo"></div>
    </div>

    <!-- Member Validation Script (must load first) -->
    <script src="/member-validation.js"></script>

    <!-- Main App Script -->
    <script src="/popup.100f6462.js" defer></script>
    
    <!-- Portal Modifier Script -->
    <script src="/portal-modifier.js" defer></script>
</body>

</html>
