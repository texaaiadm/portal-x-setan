<!DOCTYPE html>
<html>

<head>
    <title>Premium Portal</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Custom Header Overlay */
        #custom-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 999999;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #00ff88;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-logo {
            width: 100px;
            height: 40px;
            border-radius: 4px;
            border: 2px solid #00ff88;
            animation: glow 2s ease-in-out infinite;
            object-fit: cover;
        }

        @keyframes glow {

            0%,
            100% {
                box-shadow: 0 0 8px rgba(0, 255, 136, 0.4);
            }

            50% {
                box-shadow: 0 0 15px rgba(0, 255, 136, 0.8);
            }
        }

        .header-title {
            color: #00ff88;
            font-size: 16px;
            font-weight: bold;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .home-btn {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #000;
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .home-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4);
        }

        /* Iframe Container */
        #portal-frame {
            position: fixed;
            top: 50px;
            left: 0;
            width: 100%;
            height: calc(100vh - 50px);
            border: none;
        }

        /* Loading State */
        #loading-screen {
            position: fixed;
            top: 50px;
            left: 0;
            width: 100%;
            height: calc(100vh - 50px);
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 255, 136, 0.2);
            border-top: 4px solid #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: #00ff88;
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <!-- Custom Header -->
    <div id="custom-header">
        <div class="header-left">
            <img class="header-logo"
                src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExcDVqODllNmwzN283OW10NTAyMWJkdmpncWpxemYycnVlNGNvM3l2dyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/p2osL7gT4jE7bLHqRu/giphy.gif"
                alt="Logo">
            <span class="header-title">Setan Tools</span>
        </div>
        <div class="header-right">
            <button class="home-btn" id="homeBtn">🏠 HOME</button>
        </div>
    </div>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-spinner"></div>
        <p class="loading-text">Memuat Premium Portal...</p>
    </div>

    <!-- Portal Iframe -->
    <iframe id="portal-frame" src="https://premiumportal.id/"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>

    <script>
        // Home button handler
        document.getElementById('homeBtn').addEventListener('click', function () {
            window.location.href = 'index.html';
        });

        // Hide loading screen when iframe loads
        const iframe = document.getElementById('portal-frame');
        const loadingScreen = document.getElementById('loading-screen');

        iframe.addEventListener('load', function () {
            loadingScreen.style.display = 'none';
        });

        // Fallback - hide loading after 5 seconds
        setTimeout(function () {
            loadingScreen.style.display = 'none';
        }, 5000);
    </script>
</body>

</html>
